services:
  - type: web
    name: ebook-agent-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: FRONTEND_ORIGIN
        value: https://your-vercel-url.vercel.app
      - key: BACKEND_PUBLIC_URL
        value: https://your-render-service.onrender.com
      - key: SMTP_HOST
        value: localhost
      - key: SMTP_PORT
        value: "1025"
      - key: SMTP_SENDER
        value: sender@example.com
      - key: SMTP_USE_TLS
        value: "false"
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "8000"
