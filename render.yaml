services:
  - type: web
    name: ebook-agent-backend
    runtime: python
    pythonVersion: 3.11
    buildCommand: apt-get update && apt-get install -y tesseract-ocr ghostscript calibre && pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: FRONTEND_ORIGIN
        scope: preview
        value: http://localhost:3001
      - key: FRONTEND_ORIGIN
        scope: production
        value: https://your-vercel-url.vercel.app
      - key: SMTP_HOST
        value: localhost
      - key: SMTP_PORT
        value: "1025"
      - key: SMTP_SENDER
        value: sender@example.com
      - key: SMTP_USE_TLS
        value: "false"
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "8000"
