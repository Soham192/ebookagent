services:
  - type: web
    name: ebook-agent-backend
    env: docker
    dockerfilePath: Dockerfile
    envVars:
      - key: FRONTEND_ORIGIN
        scope: preview
        value: http://localhost:3001
      - key: FRONTEND_ORIGIN
        scope: production
        value: https://your-vercel-url.vercel.app
      - key: SMTP_HOST
        value: localhost
      - key: SMTP_PORT
        value: "1025"
      - key: SMTP_SENDER
        value: sender@example.com
      - key: SMTP_USE_TLS
        value: "false"
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "8000"
